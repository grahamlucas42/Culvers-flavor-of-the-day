<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Upcoming Flavors</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f4f4; font-family: Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:20px;">
        <tr>
            <td align="center">

                <!-- Main container -->
                <table width="600" cellpadding="0" cellspacing="0"
                    style="background:#ffffff; border-radius:8px; overflow:hidden;">

                    <!-- Header -->
                    <tr>
                        <td style="background:#0066cc; color:#ffffff; padding:20px; text-align:center;">
                            <h2 style="margin:0;">Upcoming Flavor of the Day</h2>
                        </td>
                    </tr>

                    <!-- Flavor list -->
                    {% for flavor in flavors %}
                    <tr>
                        <td style="padding:20px; border-bottom:1px solid #eeeeee;">

                            <table width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <!-- Image -->
                                    <td width="150" valign="top">
                                        <img src="{{ flavor.image }}" alt="{{ flavor.name }}" width="140"
                                            style="border-radius:6px;">
                                    </td>

                                    <!-- Text -->
                                    <td valign="top" style="padding-left:15px;">
                                        <p style="margin:0; font-size:14px; color:#888;">
                                            {{ flavor.date }}
                                        </p>
                                        <h3 style="margin:5px 0;">{{ flavor.name }}</h3>
                                        <p style="margin:0; font-size:14px; color:#555;">
                                            {{ flavor.description }}
                                        </p>
                                    </td>
                                </tr>
                            </table>

                        </td>
                    </tr>
                    {% endfor %}

                    <!-- Footer -->
                    <tr>
                        <td style="padding:15px; text-align:center; font-size:12px; color:#999;">
                            You’re receiving this because you love custard 🍦
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
